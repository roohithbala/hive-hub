name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/hive-help

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image_name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "image_name=ghcr.io/${REPO_NAME,,}" >> $GITHUB_OUTPUT

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image_name.outputs.image_name }}:${{ github.sha }}, ${{ steps.image_name.outputs.image_name }}:latest
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_TAG="ghcr.io/${{ github.repository }}:${{ github.sha }}"
            IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')

            # ── 1. Install K3s (only if missing) ───────────────────────────
            if ! command -v k3s > /dev/null 2>&1; then
              curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
            fi
            sudo systemctl start k3s
            sudo k3s kubectl wait --for=condition=ready node --all --timeout=120s

            # ── 2. Patch CoreDNS to fix MongoDB Atlas SRV resolution ──────
            sudo k3s kubectl -n kube-system patch configmap coredns --type merge -p \
              '{"data":{"Corefile":".:53 {\n    errors\n    health\n    ready\n    kubernetes cluster.local in-addr.arpa ip6.arpa {\n      pods insecure\n      fallthrough in-addr.arpa ip6.arpa\n    }\n    hosts /etc/coredns/NodeHosts {\n      ttl 60\n      reload 15s\n      fallthrough\n    }\n    prometheus :9153\n    forward . 8.8.8.8 8.8.4.4\n    cache 30\n    loop\n    reload\n    loadbalance\n}\n"}}' || true
            sudo k3s kubectl -n kube-system rollout restart deployment coredns

            # ── 3. Stop old ghost containers ──────────────────────────────
            sudo docker stop hive-help 2>/dev/null || true
            sudo docker rm hive-help 2>/dev/null || true

            # ── 4. GHCR pull secret ───────────────────────────────────────
            sudo k3s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # ── 5. Deploy App Pod ─────────────────────────────────────────
            sudo k3s kubectl apply -f - << EOF
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: hive-help-app
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: hive-help
              template:
                metadata:
                  labels:
                    app: hive-help
                spec:
                  dnsPolicy: "None"
                  dnsConfig:
                    nameservers:
                      - 8.8.8.8
                      - 1.1.1.1
                  imagePullSecrets:
                  - name: ghcr-secret
                  containers:
                  - name: hive-help
                    image: $IMAGE_TAG
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 80
            EOF

            # ── 6. Wait for rollout to complete ────────────────────────────
            sudo k3s kubectl rollout restart deployment hive-help-app
            sudo k3s kubectl rollout status deployment/hive-help-app --timeout=180s

            # ── 7. Install and configure Host NGINX ───────────────────────
            sudo apt-get update && sudo apt-get install -y nginx

            # Get the exact Pod IP of the newest healthy pod
            POD_IP=$(sudo k3s kubectl get pods -l app=hive-help --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[*].status.podIP}' | awk '{print \$NF}')
            
            sudo bash -c "cat > /etc/nginx/sites-enabled/default << NGINXEOF
            server {
                listen 80 default_server;
                server_name _;
                location / {
                    proxy_pass http://$POD_IP:80;
                    proxy_http_version 1.1;
                    proxy_set_header Host \\\$host;
                    proxy_set_header X-Real-IP \\\$remote_addr;
                    proxy_set_header X-Forwarded-For \\\$proxy_add_x_forwarded_for;
                    proxy_read_timeout 60s;
                }
            }
            NGINXEOF"

            sudo nginx -t && sudo systemctl enable nginx && sudo systemctl restart nginx

            echo "=============================="
            echo "  Deployment Complete ✅"
            echo "  Pod IP: $POD_IP"
            echo "🌐 Website:  http://${EC2_HOST}"
            echo "=============================="
