name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image_name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "image_name=ghcr.io/${REPO_NAME,,}" >> $GITHUB_OUTPUT

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image_name.outputs.image_name }}:${{ github.sha }}, ${{ steps.image_name.outputs.image_name }}:latest
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          IMAGE_TAG_BASE: ghcr.io/${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          IMAGE_TAG=$(echo "${IMAGE_TAG_BASE,,}:${GITHUB_SHA}")
          
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa docker-compose.yml "${EC2_USER:-ubuntu}@${EC2_HOST}:~/"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${EC2_USER:-ubuntu}@${EC2_HOST}" \
            IMAGE_TAG="$IMAGE_TAG" \
            MONGODB_URI="${{ secrets.MONGODB_URI }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            NODE_ENV="${{ secrets.NODE_ENV }}" \
            PORT="${{ secrets.PORT }}" \
            bash << 'ENDSSH'
            set -e

            # 1. Kill everything on port 80 (Nuclear option)
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            
            # 2. Cleanup K3s (Stop it to free resources)
            sudo systemctl stop k3s 2>/dev/null || true

            # 3. Deploy via Docker Compose
            export IMAGE_NAME="$IMAGE_TAG"
            export MONGODB_URI="$MONGODB_URI"
            export JWT_SECRET="$JWT_SECRET"
            export NODE_ENV="$NODE_ENV"
            export PORT="$PORT"

            docker compose pull
            docker compose up -d --remove-orphans

            echo "Deployment successful! http://${EC2_HOST}"
          ENDSSH
