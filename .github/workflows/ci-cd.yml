name: CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Detect test script
        id: tests
        run: |
          node scripts/detect-tests.js backend/package.json >> $GITHUB_OUTPUT

      - name: Install backend dependencies
        if: steps.tests.outputs.shouldRun == 'true'
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        if: steps.tests.outputs.shouldRun == 'true'
        run: npm test
        working-directory: backend

      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Set lower case repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ── 1. Install K3s (only if missing, with traefik disabled) ───
            if ! command -v k3s > /dev/null 2>&1; then
              curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
            fi
            sudo systemctl start k3s
            sudo k3s kubectl wait --for=condition=ready node --all --timeout=120s

            # ── 2. Stop conflicting services ──────────────────────────────
            sudo systemctl stop nginx 2>/dev/null || true
            sudo docker stop hive-help 2>/dev/null || true
            sudo docker rm hive-help 2>/dev/null || true
            sudo iptables -t nat -F 2>/dev/null || true

            # ── 3. GHCR pull secret ───────────────────────────────────────
            sudo k3s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # ── 4. Deploy app + LoadBalancer on port 80 ───────────────────
            # K3s servicelb will create a svclb pod that binds port 80 on host
            sudo k3s kubectl apply -f - << 'EOF'
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: hive-help-app
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: hive-help
              template:
                metadata:
                  labels:
                    app: hive-help
                spec:
                  imagePullSecrets:
                  - name: ghcr-secret
                  containers:
                  - name: hive-help
                    image: ghcr.io/${{ steps.repo.outputs.name }}:latest
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: hive-help-service
            spec:
              type: LoadBalancer
              selector:
                app: hive-help
              ports:
              - name: http
                port: 80
                targetPort: 80
            EOF

            # ── 5. Rollout latest image ───────────────────────────────────
            sudo k3s kubectl rollout restart deployment hive-help-app
            sudo k3s kubectl rollout status deployment hive-help-app --timeout=120s

            # ── 6. Wait for svclb pod to bind port 80 ─────────────────────
            sleep 5
            sudo k3s kubectl get pods -A
            echo "✅ App live at http://$(curl -s ifconfig.me)"
