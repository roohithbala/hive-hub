name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/hive-help

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.APP_IMAGE }}:${{ github.sha }}, ${{ env.APP_IMAGE }}:latest
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/hive-help:${{ github.sha }}
        run: |
          # Lowercase the image tag for GHCR
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r k8s "${EC2_USER:-ubuntu}@${EC2_HOST}:~/"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${EC2_USER:-ubuntu}@${EC2_HOST}" \
            IMAGE_TAG="$IMAGE_TAG" \
            bash << 'ENDSSH'
            set -e

            # ── 1. Stop host nginx to free port 80 ─────────────────────────
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true

            # ── 2. Install K3s (only if missing) ───────────────────────────
            if ! command -v k3s > /dev/null 2>&1; then
              curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
            fi
            sudo systemctl start k3s
            sudo k3s kubectl wait --for=condition=ready node --all --timeout=120s

            cd $HOME

            # ── 3. GHCR pull secret ───────────────────────────────────────
            sudo k3s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # ── 4. Replace placeholder with the actual image tag ───────────
            sed -i "s|IMAGE_PLACEHOLDER_APP|${IMAGE_TAG}|g" k8s/app-deployment.yaml

            # ── 5. Apply k8s resources ─────────────────────────────────────
            sudo k3s kubectl apply -f k8s/app-deployment.yaml

            # ── 6. Wait for rollout to complete ────────────────────────────
            sudo k3s kubectl rollout status deployment/hive-help-app --timeout=180s

            echo "=============================="
            echo "  Deployment Complete ✅"
            echo "=============================="
            sudo k3s kubectl get pods -A
            echo "🌐 Website:  http://${EC2_HOST}"
            echo "=============================="
          ENDSSH
