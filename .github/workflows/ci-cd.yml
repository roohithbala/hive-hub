name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/hive-help

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image_name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "image_name=ghcr.io/${REPO_NAME,,}" >> $GITHUB_OUTPUT

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image_name.outputs.image_name }}:${{ github.sha }}, ${{ steps.image_name.outputs.image_name }}:latest
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          IMAGE_TAG: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          IMAGE_TAG=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${EC2_USER:-ubuntu}@${EC2_HOST}" \
            IMAGE_TAG="$IMAGE_TAG" \
            GITHUB_ACTOR="${{ github.actor }}" \
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            bash << 'ENDSSH'
            set -e

            # ── 1. Install K3s (only if missing) ───────────────────────────
            if ! command -v k3s > /dev/null 2>&1; then
              curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
            fi
            sudo systemctl start k3s
            sudo k3s kubectl wait --for=condition=ready node --all --timeout=120s

            # ── 2. Patch CoreDNS ──────────────────────────────────────────
            sudo k3s kubectl -n kube-system patch configmap coredns --type merge -p \
              '{"data":{"Corefile":".:53 {\n    errors\n    health\n    ready\n    kubernetes cluster.local in-addr.arpa ip6.arpa {\n      pods insecure\n      fallthrough in-addr.arpa ip6.arpa\n    }\n    hosts /etc/coredns/NodeHosts {\n      ttl 60\n      reload 15s\n      fallthrough\n    }\n    prometheus :9153\n    forward . 8.8.8.8 8.8.4.4\n    cache 30\n    loop\n    reload\n    loadbalance\n}\n"}}' || true
            sudo k3s kubectl -n kube-system rollout restart deployment coredns

            # ── 3. Docker cleanup ─────────────────────────────────────────
            sudo docker stop hive-help 2>/dev/null || true
            sudo docker rm hive-help 2>/dev/null || true

            # ── 4. GHCR pull secret ───────────────────────────────────────
            sudo k3s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username="$GITHUB_ACTOR" \
              --docker-password="$GITHUB_TOKEN" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # ── 5. Deploy App Pod ─────────────────────────────────────────
            sudo k3s kubectl apply -f - << EOF
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: hive-help-app
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: hive-help
              template:
                metadata:
                  labels:
                    app: hive-help
                spec:
                  dnsPolicy: "None"
                  dnsConfig:
                    nameservers:
                      - 8.8.8.8
                      - 1.1.1.1
                  imagePullSecrets:
                  - name: ghcr-secret
                  containers:
                  - name: hive-help
                    image: $IMAGE_TAG
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 80
            EOF

            # ── 6. Wait for rollout ───────────────────────────────────────
            sudo k3s kubectl rollout restart deployment hive-help-app
            sudo k3s kubectl rollout status deployment/hive-help-app --timeout=180s

            # ── 7. Configure Host NGINX ───────────────────────────────────
            sudo apt-get update && sudo apt-get install -y nginx
            
            # Get Pod IP carefully
            POD_IP=$(sudo k3s kubectl get pods -l app=hive-help --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[*].status.podIP}' | awk '{print $NF}')
            
            if [ -z "$POD_IP" ]; then
              echo "ERROR: Could not find Pod IP"
              exit 1
            fi

            sudo tee /etc/nginx/sites-available/hive-help << NGINXEOF
            server {
                listen 80;
                server_name _;
                location / {
                    proxy_pass http://$POD_IP:80;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                }
            }
            NGINXEOF

            sudo ln -sf /etc/nginx/sites-available/hive-help /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl restart nginx
          ENDSSH
