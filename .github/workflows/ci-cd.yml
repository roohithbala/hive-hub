name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image_name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "image_name=ghcr.io/${REPO_NAME,,}" >> $GITHUB_OUTPUT

      - name: Build and push application image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image_name.outputs.image_name }}:${{ github.sha }}, ${{ steps.image_name.outputs.image_name }}:latest
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          IMAGE_TAG_BASE: ghcr.io/${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_TAG=$(echo "${IMAGE_TAG_BASE,,}:${GITHUB_SHA}")
          
          mkdir -p ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Copy k8s directory
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -r k8s "${EC2_USER:-ubuntu}@${EC2_HOST}:~/"

          # Run deployment commands
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa "${EC2_USER:-ubuntu}@${EC2_HOST}" \
            IMAGE_TAG="$IMAGE_TAG" \
            GITHUB_ACTOR="$GITHUB_ACTOR" \
            GITHUB_TOKEN="$GITHUB_TOKEN" \
            bash << 'ENDSSH'
            set -e

            # 1. Clear Port 80 and cleanup Nginx
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            sudo apt-get remove -y nginx nginx-common 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true

            # 2. Ensure K3s is running
            if ! command -v k3s > /dev/null 2>&1; then
              curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
            fi
            sudo systemctl start k3s
            
            # 3. Patch CoreDNS
            sudo k3s kubectl -n kube-system patch configmap coredns --type merge -p \
              '{"data":{"Corefile":".:53 {\n    errors\n    health\n    ready\n    kubernetes cluster.local in-addr.arpa ip6.arpa {\n      pods insecure\n      fallthrough in-addr.arpa ip6.arpa\n    }\n    hosts /etc/coredns/NodeHosts {\n      ttl 60\n      reload 15s\n      fallthrough\n    }\n    prometheus :9153\n    forward . 8.8.8.8 8.8.4.4\n    cache 30\n    loop\n    reload\n    loadbalance\n}\n"}}' || true
            sudo k3s kubectl -n kube-system rollout restart deployment coredns

            # 4. Pull Secret
            sudo k3s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username="$GITHUB_ACTOR" \
              --docker-password="$GITHUB_TOKEN" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # 5. Update YAML and Apply
            sed -i "s|IMAGE_PLACEHOLDER_APP|$IMAGE_TAG|g" k8s/final-deploy.yaml
            sudo k3s kubectl apply -f k8s/final-deploy.yaml
            
            sudo k3s kubectl rollout restart deployment hive-help-app
            sudo k3s kubectl rollout status deployment/hive-help-app --timeout=180s

            echo "Deployment successful! http://44.204.90.79"
          ENDSSH
