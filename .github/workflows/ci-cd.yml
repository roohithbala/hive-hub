name: CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Detect test script
        id: tests
        run: |
          node scripts/detect-tests.js backend/package.json >> $GITHUB_OUTPUT

      - name: Install backend dependencies
        if: steps.tests.outputs.shouldRun == 'true'
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        if: steps.tests.outputs.shouldRun == 'true'
        run: npm test
        working-directory: backend

      - name: Set image name
        id: image
        run: |
          # GHCR requires lowercase image names.
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}

      - name: Export deployment metadata
        run: |
          echo "IMAGE=${{ steps.image.outputs.name }}:latest" > deployment.env
          echo "Use deploy.sh on your VM to pull and run the container." >> deployment.env

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment.env

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lower case repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install/Configure K3s without Traefik (idempotent)
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
            
            # Wait for K3s to be fully ready
            sudo k3s kubectl wait --for=condition=ready node --all --timeout=60s
            
            # Stop any running docker-compose
            cd ~/app 2>/dev/null && sudo docker compose down 2>/dev/null || true
            
            # GHCR image pull secret
            sudo k3s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -
            
            # Deploy app pod with hostNetwork so Nginx binds directly to EC2 port 80
            cat << 'MANIFEST' | sudo k3s kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: hive-help-app
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: hive-help
              template:
                metadata:
                  labels:
                    app: hive-help
                spec:
                  hostNetwork: true
                  dnsPolicy: ClusterFirstWithHostNet
                  imagePullSecrets:
                  - name: ghcr-secret
                  containers:
                  - name: hive-help
                    image: ghcr.io/${{ steps.repo.outputs.name }}:latest
                    imagePullPolicy: Always
                    ports:
                    - containerPort: 80
            MANIFEST
            
            # Rollout restart to pull latest image
            sudo k3s kubectl rollout restart deployment hive-help-app
            sudo k3s kubectl rollout status deployment hive-help-app --timeout=90s
            
            echo "✅ Done. Nginx pod running with hostNetwork on port 80."
