apiVersion: v1
kind: Service
metadata:
  name: hive-help-service
spec:
  selector:
    app: hive-help
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-help-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hive-help
  template:
    metadata:
      labels:
        app: hive-help
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 8.8.8.8
          - 1.1.1.1
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: hive-help
          image: IMAGE_PLACEHOLDER_APP
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
